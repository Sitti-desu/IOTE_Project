<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | IoT Engineering</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index-style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="icon" href="images\Logo - Copy.png" type="image/png">
</head>
<body>

    <div id="particles-js"></div>

    <div id="header-placeholder"></div>

    <main>
        <section class="news-page-section" data-aos="fade-up" data-aos-delay="200">
            <div class="news-page-header">
                <span class="news-preview-label">News & Announcements</span>
                <h1>ข่าวสารและประกาศจาก IoTE</h1>
                <p>
                    รวบรวมข่าวสาร กิจกรรม และประกาศสำคัญล่าสุดจากภาควิชาวิศวกรรมระบบไอโอทีและสารสนเทศ
                </p>
            </div>

            <div class="news-preview-grid" id="allNewsGrid">
                <div class="news-preview-loading">Loading news...</div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#E67E22" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#E67E22",
                    "opacity": 0.3,
                    "width": 1.5
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "window",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 180, "line_linked": { "opacity": 0.8 } },
                    "push": { "particles_nb": 3 }
                }
            },
            "retina_detect": true
        });
    </script>

    <script src="js/app.js"></script>
    <script src="js/news.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });
    </script>

</body>
</html>
