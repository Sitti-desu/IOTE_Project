<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty | IoT Engineering KMITL</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admission-style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>

    <div id="header-placeholder"></div>

    <main class="mit-container">
        
        <section class="outline-border" data-aos="fade-up" data-aos-delay="200">
            <h1 class="massive-text">FACULTY.</h1>
            <p class="sub-hero">คณาจารย์ภาควิชาวิศวกรรมไอโอทีและสารสนเทศ และ ภาควิชาฟิสิกส์</p>
            <div class="vision-box">
                <p><strong>COMMITMENT:</strong> มุ่งมั่นพัฒนานักศึกษาและงานวิจัยให้ล้ำหน้า สร้างบุคลากรและวิศวกรชั้นแนวหน้าของประเทศ เพื่อรับมือกับความท้าทายในยุคดิจิทัลและอุตสาหกรรม 4.0</p>
            </div>
        </section>

        <section class="outline-border" data-aos="fade-up" data-aos-delay="200">
            <h2 class="section-title">IoT ENGINEERING</h2>
            <div id="iot-faculty-container" class="grid-3-col">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>

        <section class="outline-border" data-aos="fade-up" data-aos-delay="200">
            <h2 class="section-title">PHYSICS</h2>
            <div id="physics-faculty-container" class="grid-3-col">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>

    <script>
        async function loadFaculty() {
            try {
                const response = await fetch('api/get_faculty.php');
                const result = await response.json();

                const iotContainer = document.getElementById('iot-faculty-container');
                const phyContainer = document.getElementById('physics-faculty-container');
                iotContainer.innerHTML = '';
                phyContainer.innerHTML = '';

                if (result.status === 'success') {
                    result.data.forEach(ajarn => {
                        // ✨ ใช้คลาส tab-btn ให้การ์ดดูคลีนและมีลูกเล่นตอนเอาเมาส์ชี้
                        // ✨ ใช้คลาส tab-btn ให้การ์ดดูคลีนและมีลูกเล่นตอนเอาเมาส์ชี้
                        const card = `
                            <div class="tab-btn" style="text-align: center; display: flex; flex-direction: column; align-items: center; background: var(--card-bg);">
                                <img src="${ajarn.image_path}" onerror="this.src='https://via.placeholder.com/150x200'" style="width: 160px; height: 220px; border-radius: 16px; object-fit: cover; margin-bottom: 15px; border: 4px solid var(--bg-body); box-shadow: 0 8px 20px rgba(0,0,0,0.08);">
                                
                                <h3 style="font-size: 1.2rem; color: var(--text-main); margin-bottom: 5px;">${ajarn.fullname}</h3>
                                <p style="font-size: 0.95rem; color: var(--text-muted); margin: 0;">${ajarn.position}</p>
                            </div>
                        `;
                        if (ajarn.department === 'IoT') {
                            iotContainer.innerHTML += card;
                        } else {
                            phyContainer.innerHTML += card;
                        }
                    });
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }
        loadFaculty();
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800, // ความเร็วของแอนิเมชัน (มิลลิวินาที)
            once: true,    // ให้แสดงแอนิเมชันแค่ครั้งเดียวตอนเลื่อนลงมาเจอ
            offset: 100    // เลื่อนจอมาถึงก่อน 100px ค่อยแสดง
        });
    </script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#E67E22" }, 
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#E67E22",
                    "opacity": 0.3,
                    "width": 1.5
                },
                "move": {
                    "enable": true,
                    "speed": 2, 
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                }
            },
            "interactivity": {
                "detect_on": "window", /* เปลี่ยนเป็น window เพื่อให้จับเมาส์ได้ทั้งหน้าจอ */
                "events": {
                    "onhover": { "enable": true, "mode": "grab" }, 
                    "onclick": { "enable": true, "mode": "push" }, 
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 180, "line_linked": { "opacity": 0.8 } },
                    "push": { "particles_nb": 3 }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
